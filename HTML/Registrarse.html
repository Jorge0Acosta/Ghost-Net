<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHOST_NET — Acceso</title>
<link rel="stylesheet" href="../CSS/Registrarse.css" />
</head>
<body>

<!-- Fondos decorativos -->
<div class="fondo-grilla" aria-hidden="true"></div>
<div class="fondo-brillo" aria-hidden="true"></div>

<input type="radio" name="authTab" id="tabLoginRadio" class="tab-radio" checked>
<input type="radio" name="authTab" id="tabRegisterRadio" class="tab-radio">

<!-- ===== NAVEGACIÓN (IGUAL AL INDEX) ===== -->
<nav class="barra-nav">
  <div class="contenido-nav">

    <a href="index.html" class="logo" aria-label="Ghost Internet - Ir al inicio">
      <div class="logo__contenedor-icono">
        <img src="../SVG/escudo.svg" alt="" class="logo__icono" aria-hidden="true" />
      </div>
      <span class="logo__texto">
        GHOST<span class="logo__guion">_</span>NET
      </span>
    </a>

    <ul class="enlaces-nav" role="navigation" aria-label="Menú principal">
      <li class="enlaces-nav__elemento">
        <a href="index.html">Inicio</a>
      </li>
      <li class="enlaces-nav__elemento menu-desplegable">
        <a href="#" class="menu-desplegable__toggle">
          <span>Herramientas</span>
          <img src="../SVG/flecha-herramientas.svg" alt="" class="icono-flecha" aria-hidden="true" />
        </a>
        <ul class="submenu">
          <li><a href="EvaluacionContraseña.html">Contraseñas</a></li>
          <li><a href="VerificarCorreo.html">Correos</a></li>
          <li><a href="PerfildeRiesgo.html">Perfil de Riesgo</a></li>
          <li><a href="Correo.html">Filtraciones</a></li>
        </ul>
      </li>
      <li class="enlaces-nav__elemento">
        <a href="Estadisticas.html">Estadísticas</a>
      </li>
      <li class="enlaces-nav__elemento">
        <a href="Simuladores.html">Simulador</a>
      </li>
    </ul>

    <div class="zona-auth">
      <div id="auth-invitado" class="auth-estado">
        <label for="tabLoginRadio" class="boton-borde">Iniciar sesión</label>
        <label for="tabRegisterRadio" class="boton-primario">Registrarse</label>
      </div>
      <div id="auth-usuario" class="auth-estado oculto">
        <span class="auth-usuario__nombre" id="nombre-usuario">Usuario</span>
        <button class="boton-borde" type="button" id="btn-cerrar-sesion">Cerrar sesión</button>
      </div>
    </div>

  </div>
</nav>

<main class="auth-main">
  <div class="auth-card">

    <div class="card-header">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3.2v5.3c0 4.6-3 7.9-7 9.5-4-1.6-7-4.9-7-9.5V6.2L12 3z"/></svg>
      </div>
      <h1 class="brand-title">GHOST_NET</h1>
    </div>

    <div class="tabs">
      <label for="tabLoginRadio" class="tab">Iniciar sesión</label>
      <label for="tabRegisterRadio" class="tab">Registrarse</label>
    </div>

    <!-- LOGIN -->
    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Correo electrónico</label>
        <input type="email" id="loginEmail" placeholder="Usuario" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="loginPassword">Contraseña</label>
        <div class="password-wrapper">
          <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password">
          <button type="button" class="password-toggle" id="toggleLoginPassword" aria-label="Mostrar contraseña">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7.5 11-7.5S23 12 23 12s-4 7.5-11 7.5S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" style="width: 100%;">Iniciar sesión</button>
      <p class="demo-hint">GHOST_NET 2026</p>
    </form>

    <!-- REGISTER -->
    <form class="auth-form" id="registerForm">
      <div class="form-group">
        <label for="regName">Nombre completo</label>
        <input type="text" id="regName" placeholder="Tu nombre" autocomplete="name">
      </div>

      <div class="form-group">
        <label for="regEmail">Correo electrónico</label>
        <input type="email" id="regEmail" placeholder="usuario@ejemplo.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="regPassword">Contraseña</label>
        <div class="password-wrapper">
          <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password">
          <button type="button" class="password-toggle" id="toggleRegisterPassword" aria-label="Mostrar contraseña">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7.5 11-7.5S23 12 23 12s-4 7.5-11 7.5S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="regConfirm">Confirmar contraseña</label>
        <div class="password-wrapper">
          <input type="password" id="regConfirm" placeholder="••••••••" autocomplete="new-password">
          <button type="button" class="password-toggle" id="toggleRegisterConfirm" aria-label="Mostrar contraseña">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7.5 11-7.5S23 12 23 12s-4 7.5-11 7.5S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" style="width: 100%;">Crear cuenta</button>
    </form>

  </div>
</main>

<script>
  // ===== TOGGLE DE CONTRASEÑA (OJO FUNCIONAL) =====
  document.addEventListener('DOMContentLoaded', function() {
    // Login toggle
    const toggleLogin = document.getElementById('toggleLoginPassword');
    const loginInput = document.getElementById('loginPassword');
    if (toggleLogin && loginInput) {
      toggleLogin.addEventListener('click', function() {
        const isPassword = loginInput.type === 'password';
        loginInput.type = isPassword ? 'text' : 'password';
        toggleLogin.classList.toggle('active');
      });
    }

    // Register toggle
    const toggleRegister = document.getElementById('toggleRegisterPassword');
    const registerInput = document.getElementById('regPassword');
    if (toggleRegister && registerInput) {
      toggleRegister.addEventListener('click', function() {
        const isPassword = registerInput.type === 'password';
        registerInput.type = isPassword ? 'text' : 'password';
        toggleRegister.classList.toggle('active');
      });
    }

    // Confirm toggle
    const toggleConfirm = document.getElementById('toggleRegisterConfirm');
    const confirmInput = document.getElementById('regConfirm');
    if (toggleConfirm && confirmInput) {
      toggleConfirm.addEventListener('click', function() {
        const isPassword = confirmInput.type === 'password';
        confirmInput.type = isPassword ? 'text' : 'password';
        toggleConfirm.classList.toggle('active');
      });
    }
  });
</script>

</body>
</html>
